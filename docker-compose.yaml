services:
  frontend:
    container_name: frontend
    ports:
      - "5173:5173"
    build:
      context: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
  backend:
    container_name: backend
    ports:
      - "3000:3000"
    build:
      context: ./backend
    volumes:
      - ./backend:/app
      - /app/node_modules
